# Standalone runner for the dev container.
# Start it without VS Code:   docker compose -f .devcontainer/docker-compose.yml up -d --build
# Stop it:                    docker compose -f .devcontainer/docker-compose.yml down
# VS Code's Dev Containers extension uses this same file (via devcontainer.json),
# so "Reopen in Container" attaches to the identical environment.

# Pinned project name: makes the manual CLI and VS Code's "Reopen in Container"
# target the SAME deployment instead of fighting over the container name.
# (Pairs with dev.containers.dockerComposeProjectName in .vscode/settings.json.)
name: graph-context-mcp

services:
  dev:
    build:
      # Context is the PROJECT ROOT so the build can read pyproject.toml
      # (single source of truth for dev dependencies).
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: graph-context-mcp-dev
    user: dev
    init: true

    # Required for the iptables/ipset egress firewall.
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Apply the egress lockdown, then keep the container alive.
    command: ["/bin/sh", "-c", "sudo /usr/local/bin/init-firewall.sh && exec sleep infinity"]

    volumes:
      # Project root (the directory containing .devcontainer/) -> /workspaces/graph-context-mcp
      - ..:/workspaces/graph-context-mcp
      # Persist Claude Code login + settings across rebuilds.
      - claude-config:/home/dev/.claude

    working_dir: /workspaces/graph-context-mcp

    # Only loopback on the host can reach the published ports:
    # 8000 = MCP server, 8765 = turn-log viewer (orchestrator serve).
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8765:8765"

    # Lets the container reach the Anytype desktop app running on your Windows host.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # The headless bot node must be serving before dev's tooling dials it.
    depends_on:
      anytype:
        condition: service_healthy

    environment:
      # The headless sidecar's API (ADR 019 cutover, 2026-07-07). The
      # desktop app remains the HUMAN surface; to point tooling back at
      # it temporarily use http://host.docker.internal:31009 -- and note
      # the mounted key belongs to the BOT account, so the desktop needs
      # its own key.
      ANYTYPE_API_BASE_URL: "http://anytype:31012"
      # Path to the mounted secret. App code reads the key from this file,
      # NOT from an env var (env vars leak via docker inspect / /proc / child procs).
      ANYTYPE_API_KEY_FILE: "/run/secrets/anytype_api_key"
      # Default space for the live backend: the "TestWorld" space. Not a secret
      # (just an identifier); override per-launch with -e ANYTYPE_SPACE_ID=… .
      ANYTYPE_SPACE_ID: "bafyreibo7j5px5q7lodttgfnoeonyhobqhmitlp2erj5a3i3s5t6kvys5e.2lc7dwb79z2g4"
      # Discord bot transport (WP8). Same file-not-env-var discipline as the
      # Anytype key above. GC_CHANNELS_FILE binds each served channel to its
      # own Anytype space/profile (ADR 017); the bot ignores every channel
      # not listed. (Replaces the legacy GC_DISCORD_CHANNELS allowlist --
      # setting both fails loudly at startup.)
      DISCORD_BOT_TOKEN_FILE: "/run/secrets/discord_bot_token"
      GC_CHANNELS_FILE: "/workspaces/graph-context-mcp/channels.toml"
      # Anytype in-space chat transport (WP14): binds served spaces (and
      # their chats) to profiles, the ADR 017 analogue for the Anytype
      # transport. Endpoint-agnostic -- works against the desktop today
      # and the sidecar after cutover.
      GC_SPACES_FILE: "/workspaces/graph-context-mcp/spaces.toml"
      # Pin the orchestrator LLM (bootstrap.py). Unset = the logged-in
      # account's CLI default; pinned here to Sonnet 5.
      GC_DRIVER_MODEL: "claude-sonnet-5"
      # The turn-log viewer must bind all interfaces INSIDE the container:
      # Docker's published-port DNAT delivers host traffic to eth0, not
      # loopback. The host side stays private -- the ports: mapping above
      # pins it to 127.0.0.1.
      GC_LOG_VIEWER_HOST: "0.0.0.0"

    secrets:
      - anytype_api_key
      - discord_bot_token

  # Headless Anytype node (bot account) -- WP14 / ADR 019. Starts with
  # every `up`/rebuild (VS Code included). First-time bootstrap (see
  # docs/WORK_PACKAGES.md WP14 runbook): anytype auth create + apikey
  # create inside this container, invite the bot to your spaces, THEN
  # flip dev's ANYTYPE_API_BASE_URL to http://anytype:31012 and add
  # `depends_on: anytype: condition: service_healthy` on dev. Until the
  # account exists dev deliberately does NOT depend on this service.
  anytype:
    build:
      context: ./anytype
    container_name: graph-context-mcp-anytype
    environment:
      # Local bot node: the server-side write throttle (~1 req/s, spike
      # S7) protects nothing here -- disable it.
      ANYTYPE_API_DISABLE_RATE_LIMIT: "1"
    volumes:
      # The CLI splits its state (live-confirmed at cutover): identity,
      # config.json, and the API-key store live under ~/.config/anytype;
      # ~/.anytype holds the rest. BOTH must be volumes or a rebuild
      # wipes the bot's keys (it did, once). Identity is also backed up
      # to .devcontainer/secrets/anytype_account_key (see secrets/README.md).
      - anytype-data:/root/.anytype
      - anytype-config:/root/.config/anytype
    # No published ports: compose-network only. The dev container's
    # egress firewall already allows the container subnet.
    healthcheck:
      # 200 (key baked later) or 401 (no auth) both mean "API is up".
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:31012/v1/spaces); echo $$code | grep -qE '200|401'"]
      interval: 5s
      retries: 24
      start_period: 30s

volumes:
  claude-config:
  anytype-data:
  anytype-config:

# The secret's value lives in a host file that is git-ignored and never
# baked into the image. Create it once (see README), then it's mounted
# read-only at /run/secrets/anytype_api_key inside the container.
secrets:
  anytype_api_key:
    file: ./secrets/anytype_api_key
  discord_bot_token:
    file: ./secrets/discord_bot_token
