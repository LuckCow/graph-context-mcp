# Space-bound chats (ADR 019/021): each served Anytype space gets ONE
# runtime, and the bot serves EVERY chat in it as its own thread — its own
# session context (scratchpad / working set / mode), persisted per chat.
# Read at startup via GC_SPACES_FILE (set in docker-compose.yml). The table
# key IS the space id, so one-binding-per-space holds by construction.
#
# Keys (all optional):
#   profile        defaults to GC_PROFILE
#   project        cosmetic label
#   modes_file     overrides GC_MODES_FILE
#   chat_id        PIN: serve ONLY this chat, disable discovery (a
#                  single-chat deployment). Mutually exclusive with
#                  exclude_chats.
#   exclude_chats  list of chat ids the bot ignores; serve everything else.
#
# By default (no chat_id pin) the bot serves all chats and picks up chats
# created while it runs (GC_CHAT_RESCAN_SECONDS; default 60, off disables).
# Each chat's session lives in its own gc_session_context node keyed by
# gc_session_key (WP8/ADR 021); pre-WP8 unkeyed nodes are inert.
#
# NEVER bind a space here AND in channels.toml (Discord) at the same
# time: two runtimes on one space would clobber each other's graph state.

# The story world (moved here from channels.toml at the WP14 cutover).
# Serves every chat as a separate story-arc thread.
