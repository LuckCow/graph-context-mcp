# Channel-bound spaces (ADR 017): each Discord channel gets its own
# Anytype space, profile, and (optionally) project label / modes file.
# Read at bot startup via GC_CHANNELS_FILE (set in docker-compose.yml);
# mutually exclusive with the legacy GC_DISCORD_CHANNELS allowlist.
#
# NEVER bind a space here AND in spaces.toml (Anytype chat, ADR 019) at
# the same time: a space holds one SessionContext node, and two runtimes
# would clobber each other's session snapshot.
#
# WP14 cutover (2026-07-07): TestWorld and Todolist moved to spaces.toml
# (the Anytype in-space chat bot serves them now). Their old bindings
# stay below, commented, in case a channel needs reviving on a NEW space.

