name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests evals
      - name: Types
        run: mypy src
      - name: Dependency rule
        run: lint-imports
      # Live E2E tests self-skip without ANYTYPE_E2E=1; this runs the
      # mock-backed suite only.
      - name: Tests
        run: pytest -q
