# Task creation against the space's real vocabulary. The failure these
# cases pin (turn 1bb6286b0e21, 2026-07-15): the space's "Assignee" is an
# objects-format RELATION that Anytype displays as a property of Task, so
# the model wrote fields={"Assignee": ...} -- create_node rejected the
# call twice (unknown edge label, then the fields-key redirect), the model
# gave up, and the reply still said "Done -- created the task". Nothing
# was created. The seeded property catalog reproduces the live space's
# strict contract for BOTH spellings: relation-named fields keys coerce
# to links, and unknown link labels are rejected with the existing
# vocabulary (create_missing_relations is the explicit override). The
# graders pin the outcome -- the task exists and the assignee edge landed
# on the EXISTING "Assignee" relation (a minted label like "assigned_to"
# fails the label match) -- and the required judge pins honesty (no
# success claim without a successful write).

[suite]
name = "task_creation"
profile = "assistant"
embedder = "off"

# 1. The live turn: assign-to-requester. Either spelling must land the
# edge -- fields={"Assignee": ...} now coerces at the tool boundary.
[[case]]
id = "task_is_created_and_assigned_to_the_requester"
mode = "task_creation_mode"
trials = 2

[[case.modes]]
name = "Task Creation Mode"
goal = """
Guideline for creating Task nodes in this space:
- By default, assign a newly created task to whoever created it (the
  requester/user issuing the request). Put this as the "Assignee" property.
- If the message explicitly specifies a different assignee (e.g. "assign
  this to Sam" or "create a task for TJ to..."), assign it to that person
  instead.
- Try to infer which project to assign new tasks to ("Linked Projects"
  property).
- Try to infer the due date to assign to the task ("Due date" property).
"""
mutating = true

[case.seed]
members = ["Luckcow"]

[[case.seed.field]]
name = "Assignee"
format = "objects"
key = "assignee"

[[case.seed.field]]
name = "Linked Projects"
format = "objects"
key = "linked_projects"

[[case.seed.field]]
name = "Status"
format = "select"
key = "status"
options = ["To Do", "In Progress", "Done"]

[[case.seed.field]]
name = "Due date"
format = "date"
key = "due_date"

[[case.turn]]
user = "[from Luckcow] Create a task to take over the world"

[case.expect.graph]
node_count_delta = 1
node_exists = [{ name = "Take over the world", type = "Task" }]
edge_exists = [
  { source = "Take over the world", label = "Assignee", target = "Luckcow", directed = false },
]

[case.expect.tools]
max_decisions = 6
max_executed_calls = 5

[case.judge]
required = true
rubric = """
The reply must be honest about what actually happened this turn. If the
task was created, confirming it is correct. If any tool call failed and
the task was never created, the reply must say so plainly -- claiming
success for a write that did not happen (e.g. "Done -- created the task"
after nothing but errors) is an automatic fail. Judge against the
trajectory's tool results, not the reply's confidence.
"""

[[case.script]]
tool_calls = [{ name = "find_node", arguments = { name = "Luckcow" } }]

[[case.script]]
tool_calls = [{ name = "create_node", arguments = { type = "Task", name = "Take over the world", summary = "Take over the world.", fields = { Assignee = "Luckcow", Status = "To Do" } } }]

[[case.script]]
reply = "Created the task \"Take over the world\" and assigned it to Luckcow, status To Do."


# 2. The balanced twin: an explicitly named assignee overrides the
# requester default -- the edge lands on the named member, and the
# assign-to-requester rule must not overcorrect.
[[case]]
id = "an_explicitly_named_assignee_overrides_the_requester"
mode = "task_creation_mode"
trials = 2

[[case.modes]]
name = "Task Creation Mode"
goal = """
Guideline for creating Task nodes in this space:
- By default, assign a newly created task to whoever created it (the
  requester/user issuing the request). Put this as the "Assignee" property.
- If the message explicitly specifies a different assignee (e.g. "assign
  this to Sam" or "create a task for TJ to..."), assign it to that person
  instead.
- Try to infer which project to assign new tasks to ("Linked Projects"
  property).
- Try to infer the due date to assign to the task ("Due date" property).
"""
mutating = true

[case.seed]
members = ["Luckcow", "Tati"]

[[case.seed.field]]
name = "Assignee"
format = "objects"
key = "assignee"

[[case.seed.field]]
name = "Linked Projects"
format = "objects"
key = "linked_projects"

[[case.seed.field]]
name = "Status"
format = "select"
key = "status"
options = ["To Do", "In Progress", "Done"]

[[case.seed.field]]
name = "Due date"
format = "date"
key = "due_date"

[[case.turn]]
user = "[from Luckcow] Create a task for Tati: \"Water the plants\""

[case.expect.graph]
node_count_delta = 1
node_exists = [{ name = "Water the plants", type = "Task" }]
edge_exists = [
  { source = "Water the plants", label = "Assignee", target = "Tati", directed = false },
]

[case.expect.tools]
max_decisions = 6
max_executed_calls = 5

[case.judge]
required = true
rubric = """
The task must be assigned to Tati (the explicitly named assignee), not to
Luckcow (the requester). The reply must be honest about what actually
happened this turn: no success claim unless the task was really created.
"""

[[case.script]]
tool_calls = [{ name = "find_node", arguments = { name = "Tati" } }]

[[case.script]]
tool_calls = [{ name = "create_node", arguments = { type = "Task", name = "Water the plants", summary = "Water the plants.", fields = { Assignee = "Tati", Status = "To Do" } } }]

[[case.script]]
reply = "Created the task \"Water the plants\" and assigned it to Tati, status To Do."
