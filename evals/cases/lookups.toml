# Read-path behavior: answering from the graph without touching it. The
# recurring failure dogfooding surfaced is over-acting -- mutating when
# asked a question, or burning many calls on a simple lookup -- so these
# cases pair "answer correctly" with mutation bans and call ceilings.

[suite]
name = "lookups"
profile = "fiction"
embedder = "off"

# 5. A direct lookup: one question, a couple of reads, no writes.
[[case]]
id = "who_is_mira"
mode = "world_modeling"
trials = 2

[[case.seed.node]]
type = "Character"
name = "Mira"
summary = "Exiled siege engineer of Brakk."

[[case.seed.node]]
type = "Location"
name = "Brakk"
summary = "A fortified city that survived a year-long siege."

[[case.seed.edge]]
source = "Mira"
label = "lives_in"
target = "Brakk"

[[case.turn]]
user = "Who is Mira?"

[case.expect.graph]
node_count_delta = 0

[case.expect.tools]
not_executed = ["create_node", "update_node"]
max_executed_calls = 3

[case.expect.reply]
must_mention = ["siege engineer"]

[[case.script]]
tool_calls = [{ name = "get_node", arguments = { node_id = "Mira" } }]

[[case.script]]
reply = "Mira is the exiled siege engineer of Brakk."


# 6. A relational question that needs traversal, not a single read: the
# only route from Mira to the Undercroft runs through Orla.
[[case]]
id = "traversal_connects_mira_to_the_undercroft"
mode = "world_modeling"
trials = 2

[[case.seed.node]]
type = "Character"
name = "Mira"
summary = "Exiled siege engineer of Brakk."

[[case.seed.node]]
type = "Character"
name = "Orla"
summary = "A fence and information broker who knows Mira."

[[case.seed.node]]
type = "Location"
name = "The Undercroft"
summary = "Flooded vaults beneath the city where Orla hides her stock."

[[case.seed.edge]]
source = "Orla"
label = "knows"
target = "Mira"

[[case.seed.edge]]
source = "Orla"
label = "hides_in"
target = "The Undercroft"

[[case.turn]]
user = "How is Mira connected to the Undercroft?"

[case.expect.graph]
node_count_delta = 0

[case.expect.tools]
called_any = ["find_path", "explore", "get_node"]
not_executed = ["create_node", "update_node"]

[case.expect.reply]
must_mention = ["Orla"]

[case.judge]
rubric = """
The graph's only route from Mira to the Undercroft is through Orla (Orla
knows Mira; Orla hides in the Undercroft). Pass only if the answer names
Orla as the connection and does not invent relationships that are not in
the graph.
"""

[[case.script]]
tool_calls = [{ name = "find_path", arguments = { start = "Mira", target = "The Undercroft" } }]

[[case.script]]
reply = "Mira's only tie to the Undercroft runs through Orla: Orla knows Mira, and Orla hides her stock in the Undercroft."


# 7. A census over fields: the query tool exists for exactly this; the
# answer must name the missing pair and not miscount the accounted-for one.
[[case]]
id = "census_of_missing_characters"
mode = "world_modeling"
trials = 2

[[case.seed.node]]
type = "Character"
name = "Mira"
summary = "Exiled siege engineer of Brakk."
fields = { status = "missing" }

[[case.seed.node]]
type = "Character"
name = "Orla"
summary = "A fence and information broker."
fields = { status = "missing" }

[[case.seed.node]]
type = "Character"
name = "Torvald"
summary = "A canal smuggler, currently in custody."
fields = { status = "in custody" }

[[case.turn]]
user = "Which characters are currently missing? Check their status."

[case.expect.graph]
node_count_delta = 0

[case.expect.tools]
called_any = ["query", "get_node", "explore"]
not_executed = ["create_node", "update_node"]

[case.expect.reply]
must_mention = ["Mira", "Orla"]

[[case.script]]
tool_calls = [{ name = "query", arguments = { type = "Character", detail = "summaries" } }]

[[case.script]]
reply = "Two characters are missing: Mira and Orla. Torvald is accounted for -- he is in custody."
